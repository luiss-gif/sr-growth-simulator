<head>

    <!-- Tailwind CSS -->

    <style>

    <script type="importmap">
    {
      "imports": {

<body class="bg-slate-50">
    <div id="root"></div>

    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useEffect } from 'react';
        import { createRoot } from 'react-dom/client';
        import { LineChart, Line, XAxis, YAxis, CartesianGrid, Tooltip, ResponsiveContainer, AreaChart, Area } from 'recharts';
        import {
            TrendingUp,
            Users,
            Target,
            DollarSign,
            BarChart3,
            Settings2,
            Activity,
            ArrowRight,
            Clock,
            HelpCircle,
            Calculator,
            ChevronRight,
            Layers,
            Sparkles,
            Loader2,
            MessageSquare,
            History,
            Calendar,
            Table as TableIcon,
            UserPlus,
            ChevronDown,
            ChevronRight as ChevronRightIcon,
            TrendingDown,
            ArrowUpRight
        } from 'lucide-react';

        const App = () => {
            const [selectedForecastCase, setSelectedForecastCase] = useState('case1');
            const [activeCaseTab, setActiveCaseTab] = useState('case1');
            const [monthlyGrowthRate, setMonthlyGrowthRate] = useState(0.10);
            const [cpiScaleFactor, setCpiScaleFactor] = useState(0.15);

            const [sectionVisibility, setSectionVisibility] = useState({
                actuals: true,
                cases: true,
                forecast: true
            });
            const toggleSection = (s) => setSectionVisibility(p => ({ ...p, [s]: !p[s] }));

            const actualData = {
                "2026-02": {
                    total: { spend: 4982575, clicks: 307472, installs: 5716, instRate: 1.86, cpi: 872, regRate: 28.43, regs: 1625, regCpa: 3066 },
                    breakdown: [
                        { media: "Google広告", spend: 1940518, clicks: 36892, installs: 3268, instRate: 8.86, cpi: 594, regRate: 19.31, regs: 631, regCpa: 3075 },
                        { media: "Instagram広告", spend: 1868108, clicks: 11282, installs: 1695, instRate: 15.02, cpi: 1102, regRate: 40.65, regs: 689, regCpa: 2711 },
                        { media: "TikTok広告", spend: 1158347, clicks: 259047, installs: 753, instRate: 0.29, cpi: 1538, regRate: 40.50, regs: 305, regCpa: 3798 },
                        { media: "Apple検索広告", spend: 15601, clicks: 251, installs: 0, instRate: 0, cpi: 0, regRate: 0, regs: 0, regCpa: 0 }
                    ]
                },
                "2026-01": {
                    total: { spend: 4894880, clicks: 560619, installs: 3234, instRate: 0.58, cpi: 1514, regRate: 41.87, regs: 1354, regCpa: 3615 },
                    breakdown: [
                        { media: "Google広告", spend: 2070647, clicks: 8955, installs: 1367, instRate: 15.27, cpi: 1515, regRate: 40.01, regs: 547, regCpa: 3785 },
                        { media: "Instagram広告", spend: 1473614, clicks: 6875, installs: 1140, instRate: 16.58, cpi: 1293, regRate: 38.16, regs: 435, regCpa: 3388 },
                        { media: "TikTok広告", spend: 1333794, clicks: 544583, installs: 727, instRate: 0.13, cpi: 1835, regRate: 51.17, regs: 372, regCpa: 3585 },
                        { media: "Apple検索広告", spend: 16824, clicks: 206, installs: 0, instRate: 0, cpi: 0, regRate: 0, regs: 0, regCpa: 0 }
                    ]
                },
                "2025-12": {
                    total: { spend: 5001296, clicks: 443456, installs: 2833, instRate: 0.64, cpi: 1765, regRate: 44.76, regs: 1268, regCpa: 3944 },
                    breakdown: [
                        { media: "TikTok広告", spend: 1773456, clicks: 426846, installs: 958, instRate: 0.22, cpi: 1851, regRate: 49.16, regs: 471, regCpa: 3765 },
                        { media: "Google広告", spend: 1634207, clicks: 10872, installs: 1202, instRate: 11.06, cpi: 1360, regRate: 38.44, regs: 462, regCpa: 3537 },
                        { media: "Instagram広告", spend: 1492723, clicks: 4960, installs: 673, instRate: 13.57, cpi: 2218, regRate: 49.78, regs: 335, regCpa: 4456 }
                    ]
                }
            };

            const [expandedMonths, setExpandedMonths] = useState(["2026-02"]);
            const toggleMonth = (m) => setExpandedMonths(p => p.includes(m) ? p.filter(x => x !== m) : [...p, m]);

            const [expandedSummaryFunnels, setExpandedSummaryFunnels] = useState({ case1: true, case2: true, case3: true });
            const toggleSummaryFunnel = (c) => setExpandedSummaryFunnels(p => ({ ...p, [c]: !p[c] }));

            const [expandedSummaryLevers, setExpandedSummaryLevers] = useState({ case1: false, case2: false, case3: false });
            const toggleSummaryLevers = (c) => setExpandedSummaryLevers(p => ({ ...p, [c]: !p[c] }));

            const updateField = (caseKey, field, val) => setCases(prev => ({ ...prev, [caseKey]: { ...prev[caseKey], [field]: val } }));

            const [cases, setCases] = useState({
                case1: { name: 'Case 1: 直近実績', adSpend: 5000000, cpi: 850, regCvr: 0.30, ftueRate: 0.80, payRate: 0.15, arpu: 2000, retention: 8 },
                case2: { name: 'Case 2: 改善モデル', adSpend: 5000000, cpi: 500, regCvr: 0.40, ftueRate: 0.85, payRate: 0.18, arpu: 2500, retention: 10 },
                case3: { name: 'Case 3: 理想モデル', adSpend: 10000000, cpi: 350, regCvr: 0.50, ftueRate: 0.90, payRate: 0.20, arpu: 3000, retention: 12 },
            });

            const calculateMetrics = (params) => {
                const installs = params.adSpend / (params.cpi || 1);
                const registered = installs * params.regCvr;
                const ftueUsers = registered * params.ftueRate;
                const paidUsers = ftueUsers * params.payRate;
                const monthlyRev = paidUsers * params.arpu;
                const ltv = params.arpu * params.retention;
                const cac = paidUsers > 0 ? params.adSpend / paidUsers : 0;
                const ltvCac = cac > 0 ? ltv / cac : 0;
                const payback = params.arpu > 0 ? cac / params.arpu : 0;
                const roas = params.adSpend > 0 ? (monthlyRev / params.adSpend) * 100 : 0;
                const unitProfit = ltv - cac;
                return { installs, registered, ftueUsers, paidUsers, monthlyRev, ltv, cac, ltvCac, payback, roas, unitProfit };
            };

            const getImpactRanking = (params) => {
                const base = calculateMetrics(params).monthlyRev;
                const tests = [
                    { name: "広告予算", field: "adSpend", delta: 1.05 },
                    { name: "CPI", field: "cpi", delta: 0.95 },
                    { name: "登録率（Install→Register）", field: "regCvr", delta: 1.05 },
                    { name: "登録後チュートリアル完了率", field: "ftueRate", delta: 1.05 },
                    { name: "課金転換率", field: "payRate", delta: 1.05 },
                    { name: "ARPU", field: "arpu", delta: 1.05 },
                    { name: "継続期間", field: "retention", delta: 1.05 }
                ];
                const impacts = tests.map(t => {
                    const next = calculateMetrics({ ...params, [t.field]: params[t.field] * t.delta }).monthlyRev;
                    return { name: t.name, diff: next - base };
                }).sort((a, b) => b.diff - a.diff).slice(0, 3);
                return impacts;
            };

            const results = useMemo(() => ({
                case1: calculateMetrics(cases.case1),
                case2: calculateMetrics(cases.case2),
                case3: calculateMetrics(cases.case3),
            }), [cases]);

            const formatUSD = (jpy) => `$${(jpy / 155).toLocaleString(undefined, { minimumFractionDigits: 0, maximumFractionDigits: 0 })}`;
            const formatCurrency = (num) => `¥${Math.round(num || 0).toLocaleString()}`;
            const formatNum = (num) => Math.round(num || 0).toLocaleString();

            const handleExportPdf = () => window.print();

            const copyActualsToCase1 = () => {
                const actual = actualData["2026-02"].total;
                setCases(prev => ({
                    ...prev,
                    case1: {
                        ...prev.case1,
                        adSpend: actual.spend,
                        cpi: actual.cpi,
                        regCvr: actual.regs / actual.installs
                    }
                }));
            };

            const getDynamicAdvice = (key) => {
                const res = results[key];
                const isHealthy = res.ltvCac >= 3.0;

                if (key === 'case1') {
                    if (res.ltvCac < 2.0) return "直近の実績ベース。LTV/CACは2.0を下回っており、このままの拡大はハイリスクな状態。";
                    return "直近実績ベース。現在の効率を維持しつつ、レバーの微調整で3.0超えを目指しましょう。";
                }

                if (key === 'case2') {
                    if (isHealthy) return "主要レバー（CPI・登録率・課金率）を改善したシナリオ。積極的な投資が可能な健全フェーズです。";
                    return "主要レバーを改善したシナリオ。LTV/CACが3.0に届かない場合、さらなる転換率向上が不可欠です。";
                }

                if (key === 'case3') {
                    if (res.ltvCac > 6.0) return "理想的な成長モデル。最優先で改善項目をクリアし、一気に広告アクセルを踏むべき極めて高い効率。";
                    return "理想的な成長モデル。現状でも高い効率ですが、ARPU向上によりさらにスケールが加速します。";
                }

                return "ユニットエコノミクスを注視し、LTV/CAC 3.0以上を目安に投資判断を行ってください。";
            };

            const monthlyForecastData = useMemo(() => {
                const months = ["03", "04", "05", "06", "07", "08", "09", "10", "11", "12"];
                const baseCfg = cases[selectedForecastCase];
                let currentSpend = baseCfg.adSpend;
                let activePaidUsers = 0;
                let cumulativePaidUsers = 0;
                const churnRate = 1 / (baseCfg.retention || 1);

                return months.map((m, index) => {
                    const isMonetized = parseInt(m) >= 5;
                    if (index > 0) currentSpend = currentSpend * (1 + monthlyGrowthRate);

                    const spendRatio = currentSpend / baseCfg.adSpend;
                    const effectiveCPI = baseCfg.cpi * (1 + (spendRatio - 1) * cpiScaleFactor);

                    const monthResults = calculateMetrics({ ...baseCfg, adSpend: currentSpend, cpi: effectiveCPI });

                    const newPaidUsers = monthResults.paidUsers;
                    activePaidUsers = (activePaidUsers * (1 - churnRate)) + newPaidUsers;
                    cumulativePaidUsers += newPaidUsers;

                    return {
                        month: index === 0 ? "3月" : index === 1 ? "4月" : `${parseInt(m)}月`,
                        label: `${m}`,
                        spend: currentSpend,
                        revenue: isMonetized ? (activePaidUsers * baseCfg.arpu) : 0,
                        installs: monthResults.installs,
                        regs: monthResults.registered,
                        paid: activePaidUsers,
                        cumulative: cumulativePaidUsers,
                        isMonetized
                    };
                });
            }, [selectedForecastCase, cases, results, monthlyGrowthRate, cpiScaleFactor]);

            const getFullYearTotal = (caseKey) => {
                const cfg = cases[caseKey];
                const churnRate = 1 / (cfg.retention || 1);
                const janFebSpend = actualData["2026-01"].total.spend + actualData["2026-02"].total.spend;
                let totalRev = 0;
                let totalSpend = janFebSpend;
                let activePaid = 0;
                let currentMonthSpend = cfg.adSpend;

                for (let i = 0; i < 10; i++) {
                    const monthNum = i + 3;
                    const isMonetized = monthNum >= 5;
                    if (i > 0) currentMonthSpend = currentMonthSpend * (1 + monthlyGrowthRate);

                    const spendRatio = currentMonthSpend / cfg.adSpend;
                    const effectiveCPI = cfg.cpi * (1 + (spendRatio - 1) * cpiScaleFactor);

                    const monthData = calculateMetrics({ ...cfg, adSpend: currentMonthSpend, cpi: effectiveCPI });
                    activePaid = (activePaid * (1 - churnRate)) + monthData.paidUsers;

                    totalSpend += currentMonthSpend;
                    if (isMonetized) totalRev += (activePaid * cfg.arpu);
                }
                return { revenue: totalRev, spend: totalSpend, roi: totalRev / (totalSpend || 1) };
            };

            const getSimulationAdvice = (total) => {
                if (total.roi < 1.0) return "⚠️ 通期で赤字の見込みです。収益化までの先行投資フェーズですが、ユニット当たり利益の改善が必要です。";
                if (total.roi < 2.0) return "📈 通期黒字化の見込みです。成長を加速させるには、継続率を高め累積ユーザーを増やすことが鍵です。";
                return "✨ 非常に高い収益性です。現在の戦略を維持し、積極的にマーケットを獲得しにいきましょう。";
            };

            const StepSlider = ({ label, value, min, max, step, onChange, suffix = "", isPercent = false }) => {
                const displayVal = isPercent ? Math.round(value * 100) : value;
                return (
                    <div className="space-y-2 group">
                        <div className="flex flex-col md:flex-row md:justify-between md:items-center text-[10px] font-bold text-slate-500 uppercase">
                            <span>{label}</span>
                            <div className="bg-slate-100 px-2 py-0.5 rounded text-indigo-700 font-mono font-black w-fit mt-1 md:mt-0">
                                {displayVal}{suffix}
                            </div>
                        </div>
                        <input type="range" min={min} max={max} step={step} value={displayVal} onChange={e => onChange(isPercent ? parseFloat(e.target.value) / 100 : parseFloat(e.target.value))} className="w-full h-2.5 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600 no-export" />
                    </div>
                );
            };

            const FunnelVisual = ({ res, hideHeader = false, compact = false }) => {
                const stages = [
                    { label: "インストール", val: res.installs, color: "bg-indigo-400" },
                    { label: "ユーザー登録", val: res.registered, color: "bg-indigo-500" },
                    { label: "チュート完了", val: res.ftueUsers, color: "bg-indigo-600" },
                    { label: "有料課金", val: res.paidUsers, color: "bg-rose-500" }
                ];
                const max = res.installs || 1;
                return (
                    <div className={`${compact ? 'space-y-2 pt-1' : 'space-y-3 pt-2'}`}>
                        {!hideHeader && <p className="text-[10px] font-black text-indigo-500 uppercase flex items-center gap-1"><Layers size={12} /> コンバージョン・ファネル</p>}
                        <div className={`${compact ? 'space-y-1' : 'space-y-1.5'}`}>
                            {stages.map((s, i) => (
                                <div key={i} className="space-y-1">
                                    <div className={`flex justify-between ${compact ? 'text-[11px]' : 'text-[12px]'} font-black uppercase text-slate-400`}>
                                        <span>{s.label}</span>
                                        <span>{formatNum(s.val)} ({((s.val / max) * 100).toFixed(1)}%)</span>
                                    </div>
                                    <div className={`${compact ? 'h-2' : 'h-2.5'} w-full bg-slate-100 rounded-full overflow-hidden`}>
                                        <div className={`h-full ${s.color} transition-all duration-500`} style={{ width: `${(s.val / max) * 100}%` }}></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-7xl mx-auto p-4 md:p-8 space-y-6 animate-in fade-in duration-500 body-text">
                    <div className="flex flex-col gap-6">
                        <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-white p-4 rounded-3xl shadow-sm border border-slate-200">
                            <div className="flex items-center gap-4">
                                <div className="p-3 bg-indigo-600 rounded-2xl text-white">
                                    <Activity size={24} />
                                </div>
                                <div className="shrink-0">
                                    <h1 className="heading-primary font-black text-slate-900 leading-tight">SOULRiZA Growth Simulator</h1>
                                    <p className="text-indigo-500 desc-text font-bold flex items-center gap-1">
                                        アプリグロースのKPIとユニットエコノミクスをシミュレーションするツール
                                    </p>
                                </div>
                            </div>
                            <div className="flex flex-col md:flex-row gap-2 no-export w-full md:w-auto">
                                <button onClick={handleExportPdf} className="flex items-center gap-2 bg-slate-800 hover:bg-black text-white px-6 py-2.5 rounded-2xl font-bold transition-all mobile-btn shadow-md active:scale-95"><TableIcon size={18} /> PDFエクスポート</button>
                            </div>
                        </div>

                        {/* ツール説明セクション */}
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3 no-export">
                            <div className="bg-white p-4 rounded-3xl border border-slate-200 shadow-sm space-y-3">
                                <h3 className="section-title font-black text-slate-800 uppercase flex items-center gap-2">
                                    <HelpCircle size={18} className="text-indigo-500" /> このシミュレーターについて
                                </h3>
                                <div className="space-y-4 desc-text text-slate-600 font-medium leading-relaxed">
                                    <p>
                                        このツールでは、広告 → インストール → 登録 → 課金 → LTV / CAC までのグロースファネルをもとに、アプリ事業の成長シナリオをシミュレーションできます。
                                    </p>
                                    <div className="grid grid-cols-1 gap-1">
                                        <p className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-indigo-500 rounded-full" />この広告予算でどれくらいMRR（売上）が出るのか</p>
                                        <p className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-indigo-500 rounded-full" />LTV / CAC的に事業が成立するか</p>
                                        <p className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-indigo-500 rounded-full" />どのKPI（CPI / 登録率 / 課金率など）を改善すれば成長するか</p>
                                        <p className="flex items-center gap-2"><div className="w-1.5 h-1.5 bg-indigo-500 rounded-full" />目標売上を達成するために必要な改善量</p>
                                    </div>
                                </div>
                            </div>
                            <div className="bg-indigo-50/50 p-4 rounded-3xl border border-indigo-100 shadow-sm space-y-3">
                                <h3 className="section-title font-black text-indigo-900 uppercase flex items-center gap-2">
                                    <Settings2 size={18} className="text-indigo-600" /> 使い方
                                </h3>
                                <div className="space-y-3 desc-text text-indigo-800 font-bold">
                                    <div className="flex gap-3">
                                        <span className="flex-shrink-0 w-5 h-5 bg-indigo-600 text-white rounded-full flex items-center justify-center text-[10px]">1</span>
                                        <p>実績データをもとにCase1（現状）を設定</p>

                                    <div className="bg-slate-50 border border-slate-200 p-6 rounded-3xl">
                                        <p className="text-[10px] font-bold text-slate-400 uppercase mb-1">通期総投資額</p>
                                        <p className="text-3xl font-black text-slate-800">{formatCurrency(getFullYearTotal(selectedForecastCase).spend)}</p>
                                        <div className="mt-2 text-[10px] font-bold text-slate-400 uppercase tracking-widest">利益: {formatCurrency(getFullYearTotal(selectedForecastCase).revenue - getFullYearTotal(selectedForecastCase).spend)}</div>
                                    </div>
                                </div>

                                {/* MRR Growth Chart - Priority placement as requested */}
                                <div className="bg-slate-50 p-6 rounded-3xl border border-slate-100">
                                    <p className="text-[10px] font-black text-indigo-500 uppercase flex items-center gap-1 mb-6">
                                        <BarChart3 size={12} /> MRR Growth Forecast (累積効果の可視化)
                                    </p>
                                    <div className="h-64 w-full">
                                        <ResponsiveContainer width="100%" height="100%">
                                            <AreaChart data={monthlyForecastData} margin={{ top: 10, right: 30, left: 0, bottom: 0 }}>
                                                <defs>
                                                    <linearGradient id="colorRev" x1="0" y1="0" x2="0" y2="1">
                                                        <stop offset="5%" stopColor="#6366f1" stopOpacity={0.3} />
                                                        <stop offset="95%" stopColor="#6366f1" stopOpacity={0} />
                                                    </linearGradient>
                                                </defs>
                                                <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="#e2e8f0" />
                                                <XAxis dataKey="month" axisLine={false} tickLine={false} tick={{ fontSize: 10, fontWeight: 700, fill: '#94a3b8' }} />
                                                <YAxis axisLine={false} tickLine={false} tick={{ fontSize: 10, fontWeight: 700, fill: '#94a3b8' }} tickFormatter={(val) => `¥${(val / 1000000).toFixed(1)}M`} />
                                                <Tooltip
                                                    contentStyle={{ borderRadius: '16px', border: 'none', boxShadow: '0 10px 15px -3px rgb(0 0 0 / 0.1)', fontSize: '10px', fontWeight: 'bold' }}
                                                    formatter={(value) => [`¥${Math.round(value).toLocaleString()}`, 'MRR']}
                                                />
                                                <Area type="monotone" dataKey="revenue" stroke="#6366f1" strokeWidth={3} fillOpacity={1} fill="url(#colorRev)" />
                                            </AreaChart>
                                        </ResponsiveContainer>
                                    </div>
                                </div>

                                <div className="p-6 bg-amber-50 rounded-2xl border border-amber-100 flex gap-4 items-center">
                                    <Sparkles size={24} className="text-amber-600 shrink-0" />
                                    <div><h4 className="text-xs font-black text-amber-900 uppercase mb-1">アドバイス</h4><p className="text-[11px] font-bold text-amber-800 leading-relaxed">{getSimulationAdvice(getFullYearTotal(selectedForecastCase))}</p></div>
                                </div>
                                <div className="overflow-x-auto rounded-2xl border border-slate-100 mobile-scroll-x">
                                    <table className="w-full text-left actual-table">
                                        <thead className="bg-slate-50 border-b border-slate-100 text-slate-500">
                                            <tr className="uppercase font-black text-[10px]">
                                                <th className="p-3">月度</th>
                                                <th className="p-3 text-right">広告費</th>
                                                <th className="p-3 text-right text-indigo-600">MRR（月次サブスク売上）</th>
                                                <th className="p-3 text-right">DL数</th>
                                                <th className="p-3 text-right text-rose-600">継続中</th>
                                                <th className="p-3 text-right text-slate-400">累計</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-slate-50">
                                            {monthlyForecastData.map((m, i) => (
                                                <tr key={m.month} className="hover:bg-slate-50">
                                                    <td className="p-3 font-black">{m.month}</td>
                                                    <td className="p-3 text-right font-mono">{formatCurrency(m.spend)}</td>
                                                    <td className="p-3 text-right font-mono font-black text-indigo-600">{formatCurrency(m.revenue)}</td>
                                                    <td className="p-3 text-right font-mono">{formatNum(m.installs)}</td>
                                                    <td className="p-3 text-right font-mono text-rose-600 font-bold">{formatNum(m.paid)}</td>
                                                    <td className="p-3 text-right font-mono text-slate-400">{formatNum(m.cumulative)}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                        <tfoot className="bg-slate-900 text-white font-black">
                                            <tr>
                                                <td className="p-3 text-[10px] uppercase">2026年 合計</td>
                                                <td className="p-3 text-right font-mono text-[10px]">{formatCurrency(getFullYearTotal(selectedForecastCase).spend)}</td>
                                                <td className="p-3 text-right font-mono text-[12px] text-indigo-300">{formatCurrency(getFullYearTotal(selectedForecastCase).revenue)}</td>
                                                <td className="p-3 text-right font-mono text-[10px]">
                                                    <div className="flex flex-col items-end">
                                                        <span>{formatNum(monthlyForecastData.reduce((acc, m) => acc + m.installs, 0))} DL</span>
                                                        <span className="text-[8px] opacity-60">{formatNum(monthlyForecastData.reduce((acc, m) => acc + m.regs, 0))} 登録</span>
                                                    </div>
                                                </td>
                                                <td className="p-3 text-right font-mono text-[10px]" colSpan="2">
                                                    <div className="flex flex-col items-end">
                                                        <span>{formatNum(monthlyForecastData.reduce((acc, m) => acc + m.cumulative, 0))} 累計課金数</span>
                                                    </div>
                                                </td>
                                            </tr>
                                        </tfoot>
                                    </table>
                                </div>
                            </div>
                        )}
                    </div>
                    <div className="text-center text-slate-400 text-[10px] font-bold uppercase tracking-widest pb-12">SOULRiZA Marketing Simulator v6.x Premium</div>
                </div >
            );
        };

        const container = document.getElementById('root');
        const root = createRoot(container);
        root.render(<App />);
    </script>
</body>

</html>
