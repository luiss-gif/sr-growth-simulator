<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>S / T Simulator</title>

  <!-- Tailwind（任意。見た目用） -->
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    const PASSWORD = "AIA"; // ここは必要に応じて変更

    function checkPassword() {
      const password = document.getElementById("password").value;
      if (password === PASSWORD) {
        document.getElementById("loginView").classList.add("hidden");
        document.getElementById("homeView").classList.remove("hidden");
        document.getElementById("password").value = "";
      } else {
        alert("パスワードが違います");
      }
    }

    function goTo(path) {
      window.location.href = path;
    }

    function handleKeyDown(e) {
      if (e.key === "Enter") checkPassword();
    }
  </script>
</head>

<body class="min-h-screen bg-slate-50 flex items-center justify-center p-6">
  <div class="w-full max-w-md">

    <!-- ログイン画面 -->
    <div id="loginView" class="bg-white border border-slate-200 rounded-3xl shadow-sm p-8">
      <h1 class="text-xl font-black text-slate-900">Simulator Login</h1>
      <p class="text-slate-500 text-sm mt-2">パスワードを入力してください</p>

      <div class="mt-6 space-y-3">
        <input
          type="password"
          id="password"
          class="w-full border border-slate-200 rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-indigo-500"
          placeholder="Password"
          onkeydown="handleKeyDown(event)"
        />
        <button
          onclick="checkPassword()"
          class="w-full bg-slate-900 hover:bg-black text-white rounded-xl py-3 font-bold transition"
        >
          Enter
        </button>
      </div>
      <p class="text-[11px] text-slate-400 mt-4">Growth Support </p>
    </div>

    <!-- ホーム（選択画面） -->
    <div id="homeView" class="hidden bg-white border border-slate-200 rounded-3xl shadow-sm p-8">
      <h2 class="text-lg font-black text-slate-900">どのシミュレーションを開きますか？</h2>
      <p class="text-slate-500 text-sm mt-2">ボタンをクリックして遷移します</p>

      <div class="mt-6 grid gap-3">
        <!-- SR -->
        <button
          onclick="goTo('sr-simulator-v6.html')"
          class="w-full flex items-center justify-between bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl px-5 py-4 font-black transition"
        >
          <span>SR シミュレーション</span>
          <span class="opacity-80">→</span>
        </button>

        <!-- T -->
        <button
          onclick="goTo('t-simulator-v1.html')"
          class="w-full flex items-center justify-between bg-slate-900 hover:bg-black text-white rounded-2xl px-5 py-4 font-black transition"
        >
          <span>T シミュレーション</span>
          <span class="opacity-80">→</span>
        </button>

        <button
          onclick="location.reload()"
          class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 rounded-2xl px-5 py-3 font-bold transition mt-2"
        >
          ログイン画面に戻る
        </button>
      </div>
    </div>

  </div>
</body>
</html>
