<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SOULRiZA Simulator</title>

<style>

body{
    font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f5f5;
    margin:0;
}

.container{
    background:white;
    padding:40px;
    border-radius:16px;
    box-shadow:0 10px 25px rgba(0,0,0,0.08);
    text-align:center;
    width:90%;
    max-width:400px;
}

h2{
    font-size:28px;
    margin-bottom:10px;
}

p{
    font-size:16px;
    color:#666;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:14px;
    font-size:18px;
    border-radius:8px;
    border:1px solid #ddd;
    margin-bottom:16px;
}

button{
    width:100%;
    padding:14px;
    font-size:18px;
    border:none;
    border-radius:8px;
    background:#111;
    color:white;
    cursor:pointer;
}

button:hover{
    background:#333;
}

</style>

<script>

function checkPassword() {

var password = document.getElementById("password").value;

if (password === "AIA") {

window.location.href = "marketing%20Simulator%20v6.html";

} else {

alert("パスワードが違います");

}

}

</script>

</head>

<body>

<div class="container">

<h2>SOULRiZA Simulator</h2>

<p>パスワードを入力してください</p>

<input type="password" id="password">

<button onclick="checkPassword()">Enter</button>

</div>

</body>
</html>
